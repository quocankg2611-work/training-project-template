<!DOCTYPE html>

<html>

<head>
	<meta charset="utf-8">
	<title>Training SCSS and Bootstrap</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="A sample web application">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="./dist/css/home-page.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body id="home-page">

	<!-- Navbar -->

	<div id="navbar--placeholder"></div>

	<template id="navbar--template">
		<nav class="navbar navbar-expand-lg py-0">
			<div class="container-fluid px-0 overflow-hidden w-100">

				<!-- Toggle button (appear when collapsed) -->

				<div class="d-lg-none d-flex border-bottom border-1 border-terretri container-fluid px-3 py-2">
					<button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse"
						data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
						aria-expanded="false" aria-label="Toggle navigation">
						<span class="navbar-toggler-icon"></span>
					</button>
				</div>

				<!-- Nav Collpase -->

				<div class="collapse navbar-collapse" id="navbarSupportedContent">
					<ul class="navbar-nav me-auto mb-lg-0">
						<li class="nav-item">
							<button class="nav-button">
								<span class="nav-button__icon--add"></span>
								<span>New</span>
								<span class="nav-button__dropdown-indicator "></span>
							</button>
						</li>
						<li class="nav-item">
							<button class="nav-button">
								<span class="nav-button__icon--upload"></span>
								<span>Upload</span>
								<span class="nav-button__dropdown-indicator "></span>
							</button>
						</li>
						<li class="nav-item">
							<button class="nav-button">
								<span class="nav-button__icon--sync"></span>
								<span>Sync</span>
							</button>
						</li>
						<li class="nav-item">
							<button class="nav-button">
								<span class="nav-button__icon--export-to-excel"></span>
								<span>Export to Excel</span>
							</button>
						</li>
						<li class="nav-item">
							<button class="nav-button">
								<span class="nav-button__icon--flow"></span>
								<span>Flow</span>
								<span class="nav-button__dropdown-indicator "></span>
							</button>
						</li>
						<li class="nav-item">
							<button class="nav-button">
								<span class="nav-button__more-option">...</span>
							</button>
						</li>
					</ul>
				</div>
			</div>
		</nav>
	</template>

	<!-- Body section (table - desktop) -->

	<div class="d-none d-lg-block px-4" style="overflow-x: auto;">

		<!-- Title -->
		<h1 class="mt-5 mb-4 fw-light">Documents</h1>

		<!-- Documents table -->
		<table class="file-table">
			<thead>
				<th><span class="file-table__icon--file"></span></th>
				<th>Name <span class="file-table__dropdown-indicator"></span></th>
				<th>Modified <span class="file-table__dropdown-indicator"></span></th>
				<th>Modified By <span class="file-table__dropdown-indicator"></span></th>
				<th><span class="file-table__header-icon--add"></span> Add column</th>
				</tr>
			</thead>
			<tbody id="documents-table--placeholder--list">
				<template id="documents-table--template--item">
					<tr>
						<td>
							<!-- {{icon}} -->
						</td>
						<td>
							<!-- {{name}} -->
						</td>
						<td>
							<!-- {{modified}} -->
						</td>
						<td>
							<!-- {{modifiedBy}} -->
						</td>
						<td>
							<!-- Left empty for "Add column" -->
						</td>
					</tr>
				</template>
			<tbody>
		</table>
	</div>

	<!-- Body section (item list - mobile) -->

	<div class="d-lg-none px-2 pb-5">

		<!-- Title -->
		<h1 class="mb-3 mt-4 fw-light">Documents</h1>

		<!-- Card list -->
		<div id="card-list--placeholder--list" class="d-flex flex-column gap-4">
			<template id="card-list--template--item">
				<table class="file-card">
					<thead>
						<tr>
							<th>File Type</th>
							<th>
								<!-- {{icon}} -->
							</th>
						</tr>
					</thead>
					<tbody>
						<tr>
							<td>Name</td>
							<td>
								<!-- {{name}} -->
							</td>
						</tr>
						<tr>
							<td>Modified</td>
							<td>
								<!-- {{modified}} -->
							</td>
						</tr>
						<tr>
							<td>Modified By</td>
							<td>
								<!-- {{modifiedBy}} -->
							</td>
						</tr>
					</tbody>
				</table>
			</template>
		</div>
	</div>

	<!-- === Scripts import === -->

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
		crossorigin="anonymous"></script>
	<script src="./dist/js/home-page.js"></script>
</body>

</html>
