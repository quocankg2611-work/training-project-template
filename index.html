<!DOCTYPE html>

<html>

<head>
	<meta charset="utf-8">
	<title>Training SCSS and Bootstrap</title>
	<meta name="viewport"
		  content="width=device-width, initial-scale=1.0">
	<meta name="description"
		  content="A sample web application">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
		  rel="stylesheet"
		  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
		  crossorigin="anonymous">
	<link rel="stylesheet"
		  href="./dist/css/home-page.css">
	<link rel="stylesheet"
		  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body id="homePage"
	  class="d-flex flex-column vh-100 overflow-hidden pb-5">

	<!-- Navbar -->

	<nav class="navbar navbar-expand-lg py-0">
		<div class="container-fluid px-0 w-100">

			<!-- Toggle button (appear when collapsed) -->

			<div class="d-lg-none d-flex border-bottom border-1 border-terretri container-fluid px-3 py-2">
				<button class="navbar-toggler ms-auto"
						type="button"
						data-bs-toggle="collapse"
						data-bs-target="#navbarSupportedContent"
						aria-controls="navbarSupportedContent"
						aria-expanded="false"
						aria-label="Toggle navigation">
					<span class="navbar-toggler-icon"></span>
				</button>
			</div>

			<!-- Nav Collpase -->

			<div class="collapse navbar-collapse"
				 id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-lg-0">
					<li class="nav-item dropdown">
						<button class="nav-button dropdown-button"
								type="button"
								data-bs-toggle="dropdown"
								aria-expanded="false">
							<span class="nav-button__icon--add"></span>
							<span>New</span>
							<span class="nav-button__dropdown-indicator "></span>
						</button>
						<div class="dropdown-menu"
							 aria-labelledby="dropdownMenuButton">
							<a id="homePageNavbarNewFolder"
							   class="dropdown-item"
							   href="#">Folder</a>
							<a id="homePageNavbarNewFile"
							   class="dropdown-item"
							   href="#">File</a>
						</div>
					</li>
					<li class="nav-item dropdown">
						<button class="nav-button"
								type="button"
								data-bs-toggle="dropdown"
								aria-expanded="false">
							<span class="nav-button__icon--upload"></span>
							<span>Upload</span>
							<span class="nav-button__dropdown-indicator "></span>
						</button>
						<div class="dropdown-menu"
							 aria-labelledby="dropdownMenuButton">
							<a id="homePageNavbarUploadFile"
							   class="dropdown-item"
							   href="#">Files</a>
							<a class="dropdown-item"
							   href="#"
							   id="homePageNavbarUploadFolder">Folders</a>
						</div>
					</li>
					<li class="nav-item">
						<button class="nav-button">
							<span class="nav-button__icon--sync"></span>
							<span>Sync</span>
						</button>
					</li>
					<li class="nav-item">
						<button class="nav-button">
							<span class="nav-button__icon--export-to-excel"></span>
							<span>Export to Excel</span>
						</button>
					</li>
					<li class="nav-item">
						<button class="nav-button">
							<span class="nav-button__icon--flow"></span>
							<span>Flow</span>
							<span class="nav-button__dropdown-indicator "></span>
						</button>
					</li>
					<li class="nav-item">
						<button class="nav-button">
							<span class="nav-button__more-option">...</span>
						</button>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="flex-grow-1 d-flex flex-column px-2 px-lg-4 overflow-hidden">

		<!-- Title / Actions -->
		<div class="d-flex flex-row justify-content-between align-items-center">
			<h1 class="mt-lg-5 mb-lg-3 mt-4 mb-2 fw-light">Documents</h1>

			<div class="home-page-actions hidden d-flex gap-2">
				<button class="act-button"
						id="editBtnHomePage">
					<span class="act-button__icon--edit"></span>
					Edit
				</button>
				<button class="act-button"
						id="deleteBtnHomePage">
					<span class="act-button__icon--delete"></span>
					Delete
				</button>
				<button class="act-button act-button--cancel"
						id="cancelBtnHomePage">
					Cancel
				</button>
			</div>
		</div>

		<!-- Breadcrumb -->
		<div id="homePageBreadcrumb--placeholder"></div>

		<!-- Body section (table - desktop) -->

		<div id="homePageBody--desktop"
			 class="home-page__desktop d-none d-lg-block flex-grow-1">

			<!-- Documents table -->
			<div id="homePageBodyTable--placeholder"></div>
		</div>

		<!-- Body section (item list - mobile) -->

		<div id="homePageBody--mobile"
			 class="d-lg-none d-flex flex-column flex-grow-1 overflow-y-auto">

			<!-- Card list -->
			<div id="homePageBodyCardList--placeholder"></div>
		</div>
	</div>


	<!-- === Scripts import === -->

	<script src="./dist/js/page.js"></script>
</body>

</html>
